name: python-app-4-cicd

on:
  push: 
    paths:
      - src/**
    branches:
      - main

permissions:
  id-token: write
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      commit_id: ${{ steps.expose_id.outputs.COMMIT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Shorten commit id
        id: expose_id 
        shell: bash
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-6)
          echo "COMMIT_ID=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "COMMIT_ID=$SHORT_SHA" >> "$GITHUB_ENV"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to AWS ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: 454143665149.dkr.ecr.ap-south-1.amazonaws.com/python-app-4:${{ env.COMMIT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cd:
      needs: ci
      runs-on: [self-hosted, eks-self-hosted]
      steps:
        - name: Checkout Manifests Repo
          uses: actions/checkout@v4

        - name: Modify values file via yq
          shell: bash
          run: |
            curl -L https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o ./yq          
            chmod +x ./yq          
            ./yq e -i '.image.tag = "'"${{ needs.ci.outputs.commit_id }}"'"' charts/python-app-4/values-dev.yaml

        - name: Commit manifest changes
          uses: EndBug/add-and-commit@v9
          with:
            message: 'chore(cd): updates values-dev.yaml with commit tag ${{ needs.ci.outputs.commit_id }}'
            default_author: github_actions
            pull: '--rebase --autostash' # Syncs remote changes cleanly right before pushing
            push: true


        - name: Install ArgoCD CLI Engine
          shell: bash
          run: |
            curl -sSL -o ./argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
            chmod +x ./argocd

        - name: Connect and Login to ArgoCD Server
          shell: bash
          run: |
            # Works out-of-the-box via internal cluster routing!
            ./argocd login argocd-server.argocd.svc.cluster.local:443 \
              --insecure \
              --grpc-web \
              --username admin \
              --password ${{ secrets.ARGOCD_PASSWORD }}

        - name: Ensure ArgoCD Repository Reference and Application State
          shell: bash
          run: |
            repo="https://github.com/vanraj-boricha/python-app-4.git"

            ./argocd repo list | grep -q "$repo" || \
              ./argocd repo add "$repo"

            if ! ./argocd app get python-app-4 >/dev/null 2>&1; then
              ./argocd app create python-app-4 \
                --repo "$repo" \
                --path charts/python-app-4 \
                --dest-namespace dev \
                --dest-server https://kubernetes.default.svc \
                --values values-dev.yaml \
                --revision main \
                --sync-policy manual \
                --sync-option CreateNamespace=true
            fi

        - name: Execute Sync and Application Wait Verification
          shell: bash
          run: |
            ./argocd app sync python-app-4
            ./argocd app wait python-app-4 --timeout 180